{% extends 'base.html' %}
{% block title %}Staff sign in{% endblock %}
{% block content %}
<section class="card narrow compact-form">
    <p class="eyebrow">Office access</p>
    <h1>Staff sign in</h1>
    <form method="post" class="grid one">
        <input type="hidden" name="next" value="{{ next_url }}">
        <label>Username
            <input type="text" name="username" value="admin" autocomplete="username">
        </label>
        <label>Password
            <input type="password" name="password" autocomplete="current-password">
        </label>
        <button class="button" type="submit">Sign in</button>
        <p class="mini">Demo login: <code>admin</code> / <code>alterna-demo</code></p>
    </form>
</section>
{% endblock %}
